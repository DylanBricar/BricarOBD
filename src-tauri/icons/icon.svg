<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- macOS squircle shape -->
    <clipPath id="squircle">
      <path d="M256 0C388 0 432 0 472 20C496 32 512 56 512 80C512 120 512 168 512 256C512 344 512 392 512 432C512 456 496 480 472 492C432 512 388 512 256 512C124 512 80 512 40 492C16 480 0 456 0 432C0 392 0 344 0 256C0 168 0 120 0 80C0 56 16 32 40 20C80 0 124 0 256 0Z"/>
    </clipPath>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0F1D32"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="160" y1="120" x2="380" y2="400">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <!-- Glow gradient -->
    <radialGradient id="glow" cx="256" cy="240" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="140" y1="100" x2="370" y2="360">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <g clip-path="url(#squircle)">
    <rect width="512" height="512" fill="url(#bgGrad)"/>
    <!-- Subtle glow -->
    <circle cx="256" cy="240" r="180" fill="url(#glow)"/>
    <!-- Subtle grid pattern -->
    <line x1="0" y1="128" x2="512" y2="128" stroke="#06B6D4" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#06B6D4" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#06B6D4" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#06B6D4" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#06B6D4" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#06B6D4" stroke-opacity="0.04" stroke-width="1"/>
  </g>

  <!-- Border squircle -->
  <g clip-path="url(#squircle)">
    <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#06B6D4" stroke-opacity="0.15" stroke-width="2"/>
  </g>

  <!-- OBD-II Connector stylized icon -->
  <g transform="translate(256, 215)" clip-path="url(#squircle)">
    <!-- Outer ring — speedometer/gauge feel -->
    <circle cx="0" cy="0" r="115" stroke="url(#ringGrad)" stroke-width="6" fill="none" opacity="0.8"/>
    <!-- Tick marks around the ring -->
    <g stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" opacity="0.5">
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(0)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(30)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(60)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(90)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(120)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(150)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(180)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(210)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(240)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(270)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(300)"/>
      <line x1="0" y1="-105" x2="0" y2="-97" transform="rotate(330)"/>
    </g>
    <!-- Active arc (like a gauge reading) -->
    <path d="M -81 -81 A 115 115 0 0 1 81 -81" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- OBD connector shape (trapezoid) -->
    <path d="M -42 -8 L -50 22 L 50 22 L 42 -8 Z" fill="#0F1D32" stroke="url(#accentGrad)" stroke-width="3" rx="4"/>
    <!-- Connector pins (16 pins in 2 rows like real OBD-II) -->
    <g fill="#06B6D4">
      <!-- Top row: 8 pins -->
      <rect x="-36" y="-2" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="-26" y="-2" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="-16" y="-2" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="-6" y="-2" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="4" y="-2" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="14" y="-2" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="24" y="-2" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="34" y="-2" width="4" height="8" rx="1" opacity="0.7"/>
      <!-- Bottom row: 8 pins -->
      <rect x="-36" y="10" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="-26" y="10" width="4" height="8" rx="1" opacity="0.7"/>
      <rect x="-16" y="10" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="-6" y="10" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="4" y="10" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="14" y="10" width="4" height="8" rx="1" opacity="0.7"/>
      <rect x="24" y="10" width="4" height="8" rx="1" opacity="0.9"/>
      <rect x="34" y="10" width="4" height="8" rx="1" opacity="0.9"/>
    </g>
    <!-- Signal waves emanating from connector -->
    <path d="M -65 5 Q -75 -15 -65 -35" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M -75 5 Q -88 -20 -75 -45" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
    <path d="M 65 5 Q 75 -15 65 -35" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M 75 5 Q 88 -20 75 -45" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
  </g>

  <!-- App name -->
  <text x="256" y="395" text-anchor="middle" fill="#F1F5F9" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="2">Bricar<tspan fill="#06B6D4">OBD</tspan></text>

  <!-- Subtle tagline -->
  <text x="256" y="430" text-anchor="middle" fill="#64748B" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="3">DIAGNOSTIC</text>
</svg>
