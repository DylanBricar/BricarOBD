name: Auto Release on Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - '.github/workflows/auto-release.yml'

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    name: Bump version & create tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v2.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Bump patch version
        id: bump
        run: |
          TAG="${{ steps.get_tag.outputs.latest_tag }}"
          # Remove 'v' prefix
          VERSION="${TAG#v}"
          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Increment patch
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Bumping: $TAG -> $NEW_TAG"

      - name: Update version in package.json
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" package.json
          echo "Updated package.json to $NEW_VERSION"

      - name: Update version in tauri.conf.json
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json
          echo "Updated tauri.conf.json to $NEW_VERSION"

      - name: Update version in Cargo.toml
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml
          echo "Updated Cargo.toml to $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create and push tag
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Created and pushed tag: $NEW_TAG"
