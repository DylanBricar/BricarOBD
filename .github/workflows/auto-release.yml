name: Auto Release on Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - '.github/workflows/*.yml'

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    name: Bump version & create tag
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v2.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Bump patch version
        id: bump
        run: |
          TAG="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Bumping: $TAG -> $NEW_TAG"

      - name: Update version files
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

      - name: Commit version bump & create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

  # ═══════════════════════════════════════════
  # Desktop builds (macOS, Windows, Linux)
  # ═══════════════════════════════════════════
  build-desktop:
    needs: [bump-and-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows (x64)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux (x64)

    runs-on: ${{ matrix.platform }}
    name: Desktop — ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.new_tag }}

      - name: Download database from release assets
        run: |
          mkdir -p src-tauri/data
          curl -L -o src-tauri/data/bricarobd.db "https://github.com/${{ github.repository }}/releases/download/db-v1/bricarobd.db" || echo "DB download failed"
        shell: bash

      - name: Fallback — download DB via gh cli
        if: hashFiles('src-tauri/data/bricarobd.db') == ''
        run: gh release download db-v1 --pattern 'bricarobd.db' --dir src-tauri/data/ || echo "No DB release found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Verify database
        run: |
          if [ -f "src-tauri/data/bricarobd.db" ]; then
            echo "Database found: $(du -h src-tauri/data/bricarobd.db | cut -f1)"
          else
            echo "ERROR: Database not found!"
            exit 1
          fi
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.bump-and-tag.outputs.new_tag }}
          releaseName: 'BricarOBD ${{ needs.bump-and-tag.outputs.new_tag }}'
          releaseBody: |
            ## BricarOBD ${{ needs.bump-and-tag.outputs.new_tag }}

            ### Professional OBD-II Diagnostic Tool

            **Platforms:** macOS (Apple Silicon + Intel) · Windows · Linux · Android · iOS

            **What's included:**
            - 3.17M operations database (PSA, VAG, BMW, Mercedes, Renault, Toyota, Honda, etc.)
            - 8,807 DTC codes + 415 repair tips
            - 70 OBD-II PIDs + 391 manufacturer DIDs
            - 9 protocols · 4 init strategies · WiFi + USB adapters
            - SafetyGuard (12 blocked services, default-deny)
            - Bilingual FR/EN · Demo mode · Dev console · CSV export
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # ═══════════════════════════════════════════
  # Android build (.apk)
  # ═══════════════════════════════════════════
  build-android:
    needs: [bump-and-tag, build-desktop]
    runs-on: ubuntu-latest
    name: Android — APK

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.new_tag }}

      - name: Download database
        run: |
          mkdir -p src-tauri/data
          curl -L -o src-tauri/data/bricarobd.db "https://github.com/${{ github.repository }}/releases/download/db-v1/bricarobd.db"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Init Tauri Android
        run: cargo tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Build Android APK
        run: cargo tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
          ANDROID_KEY_STORE: ${{ secrets.ANDROID_KEY_STORE }}
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-and-tag.outputs.new_tag }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
            src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
