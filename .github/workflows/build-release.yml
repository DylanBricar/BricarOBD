name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v2.0.1)'
        required: true

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════
  # Desktop builds (macOS, Windows, Linux)
  # ═══════════════════════════════════════════
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows (x64)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux (x64)

    runs-on: ${{ matrix.platform }}
    name: Desktop — ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download database from release assets
        run: |
          mkdir -p src-tauri/data
          curl -L -o src-tauri/data/bricarobd.db "https://github.com/${{ github.repository }}/releases/download/db-v1/bricarobd.db" || echo "DB download failed"
        shell: bash

      - name: Fallback — download DB via gh cli
        if: hashFiles('src-tauri/data/bricarobd.db') == ''
        run: gh release download db-v1 --pattern 'bricarobd.db' --dir src-tauri/data/ || echo "No DB release found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Verify database
        run: |
          if [ -f "src-tauri/data/bricarobd.db" ]; then
            echo "Database found: $(du -h src-tauri/data/bricarobd.db | cut -f1)"
          else
            echo "ERROR: Database not found!"
            exit 1
          fi
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'BricarOBD ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            ## BricarOBD ${{ inputs.tag || github.ref_name }}

            ### Professional OBD-II Diagnostic Tool

            **Platforms:** macOS (Apple Silicon + Intel) · Windows · Linux · Android · iOS

            **What's included:**
            - 3.17M operations database (PSA, VAG, BMW, Mercedes, Renault, Toyota, Honda, etc.)
            - 8,807 DTC codes + 415 repair tips
            - 70 OBD-II PIDs + 391 manufacturer DIDs
            - 9 protocols · 4 init strategies · WiFi + USB adapters
            - SafetyGuard (12 blocked services, default-deny)
            - Bilingual FR/EN · Demo mode · Dev console · CSV export

            **Desktop install:**
            - **macOS**: Download `.dmg`, drag to Applications
            - **Windows**: Download `.msi` or `.exe`
            - **Linux**: Download `.deb` or `.AppImage`

            **Mobile:**
            - **Android**: Download `.apk`, enable "Install from unknown sources"
            - **iOS**: Install via TestFlight (link in description)
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # ═══════════════════════════════════════════
  # Android build (.apk)
  # ═══════════════════════════════════════════
  build-android:
    needs: [build-desktop]
    runs-on: ubuntu-latest
    name: Android — APK

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download database
        run: |
          mkdir -p src-tauri/data
          curl -L -o src-tauri/data/bricarobd.db "https://github.com/${{ github.repository }}/releases/download/db-v1/bricarobd.db"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Init Tauri Android
        run: cargo tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Build Android APK
        run: cargo tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
          ANDROID_KEY_STORE: ${{ secrets.ANDROID_KEY_STORE }}
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
            src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════
  # iOS build (.ipa) — for TestFlight / Ad-hoc
  # ═══════════════════════════════════════════
  build-ios:
    needs: [build-desktop]
    runs-on: macos-latest
    name: iOS — IPA
    # Only run if signing vars are configured
    if: vars.APPLE_SIGNING_ENABLED == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download database
        run: |
          mkdir -p src-tauri/data
          curl -L -o src-tauri/data/bricarobd.db "https://github.com/${{ github.repository }}/releases/download/db-v1/bricarobd.db"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Init Tauri iOS
        run: cargo tauri ios init

      - name: Build iOS
        run: cargo tauri ios build
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            src-tauri/gen/apple/build/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Upload to TestFlight automatically
      - name: Upload to TestFlight
        if: vars.TESTFLIGHT_ENABLED == 'true'
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file src-tauri/gen/apple/build/**/*.ipa \
            --apiKey "${{ secrets.APPLE_API_KEY }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER }}"
