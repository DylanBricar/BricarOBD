name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows (x64)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux (x64)

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download database from release assets
        run: |
          mkdir -p src-tauri/data
          curl -L -o src-tauri/data/bricarobd.db "https://github.com/${{ github.repository }}/releases/download/db-v1/bricarobd.db" || echo "DB download failed — will try gh cli"
        shell: bash

      - name: Fallback — download DB via gh cli
        if: hashFiles('src-tauri/data/bricarobd.db') == ''
        run: gh release download db-v1 --pattern 'bricarobd.db' --dir src-tauri/data/ || echo "No DB release found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Verify database
        run: |
          if [ -f "src-tauri/data/bricarobd.db" ]; then
            echo "Database found: $(du -h src-tauri/data/bricarobd.db | cut -f1)"
          else
            echo "ERROR: Database not found!"
            exit 1
          fi
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BricarOBD ${{ github.ref_name }}'
          releaseBody: |
            ## BricarOBD ${{ github.ref_name }}

            ### Professional OBD-II Diagnostic Tool

            **v2.0 — Rust Edition:**
            - Complete rewrite in Rust (Tauri 2.x) + React + TypeScript
            - DDT2000 database: 3.17M operations, 90 vehicle profiles, 4866 ECUs
            - 8,807 DTC codes with descriptions + 415 repair tips
            - 70 standard OBD-II PIDs + 391 manufacturer DIDs (PSA, VAG, BMW, Mercedes, etc.)
            - 9 OBD-II protocols (CAN, KWP2000, ISO 9141, J1850)
            - Auto baud rate detection + 4 connection strategies (genuine + clone ELM327)
            - Demo mode (Peugeot 207) for testing without adapter
            - Bilingual FR/EN interface with glassmorphic automotive theme
            - Built-in developer console (real-time TX/RX serial logs)
            - SafetyGuard: 11 blocked UDS services by default
            - CSV export for live data and DTC reports

            **Compatibility:**
            - All OBD-II vehicles (1996+)
            - ELM327 USB, Bluetooth, WiFi adapters (genuine + clones v1.5/v2.1)
            - macOS (Apple Silicon + Intel), Windows, Linux

            **Install:**
            - **macOS**: Download `.dmg`, drag to Applications
            - **Windows**: Download `.msi` or `.exe`, install
            - **Linux**: Download `.deb` or `.AppImage`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
